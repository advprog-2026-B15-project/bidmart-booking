name: PR staging -> main

on:
  push:
    branches: [staging]

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-and-automerge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --head staging --base main --state open --json number -q '.[0].number')

          if [ -z "$existing" ]; then
            gh pr create \
              --head staging \
              --base main \
              --title "Auto PR: staging → main" \
              --body "Automated promotion from staging."
          fi

      - name: Enable auto merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr=$(gh pr list --head staging --base main --state open --json number -q '.[0].number')
          gh pr merge "$pr" --auto --merge
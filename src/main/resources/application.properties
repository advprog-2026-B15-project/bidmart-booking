spring.application.name=bidmart-booking
server.port=${PORT:8085}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/bidmart_booking}
spring.datasource.username=${DB_USERNAME:bidmart_booking}
spring.datasource.password=${DB_PASSWORD:b15-adpro}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.seed.dummy-data=${APP_SEED_DUMMY_DATA:true}

spring.application.name=bidmart-booking
server.port=${PORT:8085}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/bidmart_booking}
spring.datasource.username=${DB_USERNAME:bidmart_booking}
spring.datasource.password=${DB_PASSWORD:b15-adpro}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.seed.dummy-data=${APP_SEED_DUMMY_DATA:true}
app.dev.endpoints.enabled=${DEV_ENDPOINTS_ENABLED:true}

spring.rabbitmq.addresses=${SPRING_RABBITMQ_ADDRESSES:amqp://localhost}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
